{% extends 'base.html' %}
{% block content %}
<h2>Add Password</h2>
<form method="post" class="form-card" id="add-pass-form">
  {% csrf_token %}
  <div class="form-group">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" required>
  </div>
  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <div class="strength"><div id="strength-bar"></div></div>
  </div>
  <div class="form-group">
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="4"></textarea>
  </div>
  <div style="display:flex;gap:10px">
    <button type="submit" class="btn primary">Save Password</button>
    <a href="{% url 'password_list' %}" class="btn secondary">Cancel</a>
  </div>
</form>

<script>
  (function(){
    const pass = document.getElementById('password');
    const bar = document.getElementById('strength-bar');

    function calcStrength(p){
      let s = 0;
      if(p.length >= 8) s++;
      if(/[A-Z]/.test(p)) s++;
      if(/[a-z]/.test(p)) s++;
      if/\d/.test(p) s++;
      if(/[^A-Za-z0-9]/.test(p)) s++;
      return Math.min(s,5);
    }
    function render(){
      const s = calcStrength(pass.value);
      const pct = (s/5)*100;
      bar.style.width = pct + '%';
      bar.className = s >= 4 ? 'ok' : s >= 3 ? 'mid' : 'low';
    }
    pass.addEventListener('input', render);
    render();
  })();
</script>
{% endblock %}
