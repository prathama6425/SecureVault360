{% extends 'base.html' %}
{% block content %}
<div class="row-between">
  <h2>Your Passwords</h2>
  <a class="btn primary" href="{% url 'add_password' %}">Add</a>
</div>
<table class="table">
  <thead><tr><th>Title</th><th>Username</th><th>Actions</th></tr></thead>
  <tbody>
    {% for password in passwords %}
    <tr>
      <td>{{ password.title }}</td>
      <td>{{ password.username }}</td>
      <td><a href="{% url 'view_password' password.pk %}" class="btn">View</a></td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No passwords yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
