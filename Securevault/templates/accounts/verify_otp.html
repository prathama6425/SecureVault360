{% extends 'base.html' %}
{% block content %}
<h2>Verify OTP</h2>
<p>We sent a 5-minute OTP to your email.</p>
<form method="post" class="form-card">
  {% csrf_token %}
  <label>Enter OTP <input name="otp" required></label>
  <button class="btn primary" type="submit">Verify</button>
  {% if dev_otp %}
  <p style="margin-top:12px;color:#93c5fd">Dev mode: OTP is <strong>{{ dev_otp }}</strong></p>
  {% endif %}
{% endblock %}
